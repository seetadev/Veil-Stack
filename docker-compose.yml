version: "3.8"

services:
  # Local Ethereum node (for dev/test clouds)
  ganache:
    image: trufflesuite/ganache:latest
    command: --wallet.totalAccounts 10 --wallet.defaultBalance 1000 --port 8545
    ports:
      - "8545:8545"
    networks:
      - veil-net

  # Canteen backend node
  canteen-node-1:
    build:
      context: ./canteen
      dockerfile: Dockerfile
    depends_on:
      - ganache
    environment:
      - ACTIVE_CHAIN=ethereum
      - ETH_RPC_URL=http://ganache:8545
      - ETH_CONTRACT_ADDRESS=
      - PORT=5000
      - WEB_PORT=5001
      - NODE_ENV=development
      - DOCKER_SOCKET=/var/run/docker.sock
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - veil-net

  # Dashboard (React frontend)
  dashboard:
    build:
      context: ./canteen/dashboard
      dockerfile: Dockerfile
    depends_on:
      - canteen-node-1
    environment:
      - REACT_APP_CLUSTER_URL=http://canteen-node-1:5001/cluster
      - REACT_APP_ETH_RPC_URL=http://ganache:8545
    ports:
      - "3000:3000"
    networks:
      - veil-net

networks:
  veil-net:
    driver: bridge
